name: Refresh Apple client secret

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-apple-client-secret
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APPLE_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.84.2

      - name: Generate and publish Apple client secret
        shell: bash
        run: |
          set -euo pipefail
          apple_client_secret="$(node scripts/generate-apple-client-secret.mjs)"
          echo "::add-mask::$apple_client_secret"
          supabase secrets set \
            "APPLE_CLIENT_ID=$APPLE_CLIENT_ID" \
            "APPLE_CLIENT_SECRET=$apple_client_secret" \
            --project-ref "$SUPABASE_PROJECT_REF"

