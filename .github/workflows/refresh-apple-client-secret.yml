name: Refresh Apple client secret

on:
  schedule:
    - cron: "17 3 1 * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: refresh-apple-client-secret
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      APPLE_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_PRIVATE_KEY_BASE64 }}
      APPLE_KEY_ID: ${{ secrets.APPLE_KEY_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_CLIENT_ID: ${{ secrets.APPLE_CLIENT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v3
        with:
          version: 2.84.2

      - name: Generate and publish Apple client secret
        shell: bash
        run: |
          set -euo pipefail

          apple_client_secret="$(node scripts/generate-apple-client-secret.mjs)"
          echo "::add-mask::$apple_client_secret"

          auth_payload="$(
            APPLE_CLIENT_SECRET="$apple_client_secret" node -e '
              process.stdout.write(JSON.stringify({
                external_apple_enabled: true,
                external_apple_client_id: process.env.APPLE_CLIENT_ID,
                external_apple_secret: process.env.APPLE_CLIENT_SECRET,
              }));
            '
          )"

          curl --fail --silent --show-error \
            --output /dev/null \
            --request PATCH \
            "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/config/auth" \
            --header "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            --header "Content-Type: application/json" \
            --data "$auth_payload"

          supabase secrets set \
            "APPLE_CLIENT_ID=$APPLE_CLIENT_ID" \
            "APPLE_CLIENT_SECRET=$apple_client_secret" \
            --project-ref "$SUPABASE_PROJECT_REF"
